<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Em Manutenção</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { text-align: center; padding: 60px 40px; max-width: 480px; }
  .icon { font-size: 64px; margin-bottom: 24px; animation: spin 4s linear infinite; display: inline-block; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 16px; color: #e6edf3; }
  p { color: #7d8590; line-height: 1.6; font-size: 16px; margin-bottom: 12px; }
  .badge { display: inline-block; background: #21262d; border: 1px solid #30363d; border-radius: 100px; padding: 6px 16px; font-size: 13px; color: #F8B4C5; margin-top: 24px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">⚙️</div>
  <h1>Site em Manutenção</h1>
  <p>Estamos realizando melhorias para oferecer uma experiência ainda melhor.</p>
  <p>Voltaremos em breve. Agradecemos sua paciência!</p>
  <div class="badge">Voltamos logo • <span id="time"></span></div>
</div>
<script>
  const el = document.getElementById('time');
  setInterval(() => { el.textContent = new Date().toLocaleTimeString('pt-BR'); }, 1000);
  el.textContent = new Date().toLocaleTimeString('pt-BR');
</script>
</body>
</html>
