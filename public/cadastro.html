<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Criar Conta — POWER FIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
<link rel="stylesheet" href="/css/brand.css">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; max-width:100%; overflow-x:hidden; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* HEADER */
header {
  background: var(--blue);
  padding: 12px 20px;
  position: sticky; top: 0; z-index: 99;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  max-width: 540px; margin: 0 auto;
}
.logo { font-size: 20px; font-weight: 800; text-decoration: none; color: #fff; letter-spacing: -.01em; }
.logo span { color: #fff; opacity: .8; }
.back-link {
  font-size: 13px; color: rgba(255,255,255,.85);
  text-decoration: none; font-weight: 600;
  display: flex; align-items: center; gap: 4px;
}
.back-link:hover { color: #fff; }

/* MAIN */
main {
  flex: 1;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 36px 20px 140px;
}

/* CARD */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  padding: 34px 30px;
  width: 100%; max-width: 500px;
}

.card-brand { text-align: center; margin-bottom: 22px; }
.card-brand-icon {
  width: 52px; height: 52px; border-radius: 14px;
  background: var(--blue); color: #fff;
  display: inline-grid; place-items: center;
  font-size: 22px; margin-bottom: 12px;
  box-shadow: 0 6px 20px rgba(0,165,216,.25);
}
.card-title { font-size: 23px; font-weight: 800; margin-bottom: 4px; text-align: center; }
.card-subtitle { color: var(--text-2); font-size: 14px; margin-bottom: 26px; text-align: center; }

/* FORM */
.form-group { margin-bottom: 15px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

label {
  display: block; font-size: 13px; font-weight: 600;
  margin-bottom: 5px; color: var(--text);
}
input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  font-size: 15px; font-family: inherit;
  color: var(--text); background: var(--bg);
  transition: border-color .2s, box-shadow .2s;
  outline: none;
}
input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(0,165,216,.15);
  background: var(--card);
}
input.error-input { border-color: #DC2626 !important; }

.field-error { font-size: 12px; color: #DC2626; margin-top: 4px; display: none; font-weight: 500; }

.password-wrapper { position: relative; }
.password-wrapper input { padding-right: 44px; }
.toggle-pw {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--muted); padding: 0;
  display: flex; align-items: center;
}
.toggle-pw:hover { color: var(--blue); }

/* PASSWORD STRENGTH */
.password-strength { margin-top: 6px; font-size: 12px; display: none; }
.strength-bar { height: 3px; border-radius: 3px; margin-top: 3px; transition: all .3s; }

/* BUTTON */
.btn-primary {
  width: 100%; padding: 13px;
  background: var(--blue); color: #fff;
  border: none; border-radius: 9px;
  font-size: 15px; font-weight: 700; font-family: inherit;
  cursor: pointer;
  transition: background .2s, transform .15s, box-shadow .2s;
  margin-top: 6px;
}
.btn-primary:hover { background: var(--blue-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,165,216,.3); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }

/* MESSAGES */
.error-msg {
  background: #FEF2F2; border: 1px solid #FECACA;
  color: #DC2626; padding: 11px 14px;
  border-radius: 8px; font-size: 13px;
  margin-bottom: 16px; display: none;
}
.success-msg {
  background: #F0FDF4; border: 1px solid #BBF7D0;
  color: var(--green); padding: 14px;
  border-radius: 8px; font-size: 14px;
  margin-bottom: 16px; display: none; text-align: center;
  font-weight: 600;
}

/* DIVIDER */
.divider {
  text-align: center; color: var(--muted);
  font-size: 12px; margin: 20px 0; position: relative;
}
.divider::before, .divider::after {
  content: ''; position: absolute; top: 50%;
  width: 44%; height: 1px; background: var(--border);
}
.divider::before { left: 0; }
.divider::after  { right: 0; }

/* LINK ROW */
.link-row { text-align: center; font-size: 14px; color: var(--text-2); }
.link-row a { color: var(--blue); font-weight: 600; text-decoration: none; }
.link-row a:hover { text-decoration: underline; }

/* SPINNER */
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.4);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 520px) {
  .card { padding: 26px 18px; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
<script src="/js/meta-pixel.js"></script>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="/" data-site-logo>POWER<span>FIT</span></a>
    <a class="back-link" href="/login.html">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Já tenho conta
    </a>
  </div>
</header>

<main>
  <div class="card">
    <div class="card-brand">
      <div class="card-brand-icon"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></div>
    </div>
    <h1 class="card-title">Criar sua conta</h1>
    <p class="card-subtitle">Preencha os dados abaixo para se cadastrar gratuitamente</p>

    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <form id="cadastro-form" novalidate>
      <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" placeholder="João da Silva" autocomplete="name" required/>
        <div class="field-error" id="nome-err"></div>
      </div>

      <div class="form-group">
        <label for="whatsapp">WhatsApp <span style="color:var(--blue)">*</span></label>
        <input type="tel" id="whatsapp" placeholder="(11) 99999-9999" maxlength="15" autocomplete="tel" inputmode="tel" required/>
        <div class="field-error" id="whatsapp-err"></div>
      </div>

      <div class="form-group">
        <label for="cpf" style="display:flex;align-items:center;gap:6px;">CPF <span style="font-size:11px;color:var(--muted);font-weight:400;">(opcional — para nota fiscal)</span></label>
        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" autocomplete="off" inputmode="numeric"/>
        <div class="field-error" id="cpf-err"></div>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seuemail@exemplo.com" autocomplete="email" required/>
        <div class="field-error" id="email-err"></div>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <div class="password-wrapper">
          <input type="password" id="senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required/>
          <button type="button" class="toggle-pw" id="toggle-pw1" aria-label="Mostrar senha">
            <svg id="eye1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="password-strength" id="pw-strength"></div>
        <div class="field-error" id="senha-err"></div>
      </div>

      <div class="form-group">
        <label for="confirmar">Confirmar Senha</label>
        <div class="password-wrapper">
          <input type="password" id="confirmar" placeholder="Repita a senha" autocomplete="new-password" required/>
          <button type="button" class="toggle-pw" id="toggle-pw2" aria-label="Mostrar confirmação">
            <svg id="eye2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="field-error" id="confirmar-err"></div>
      </div>

      <button type="submit" class="btn-primary" id="submit-btn">Criar minha conta</button>
    </form>

    <div class="divider">ou</div>
    <div class="link-row">Já tem conta? <a href="/login.html">Entrar agora</a></div>
  </div>
</main>

<script>
(function () {
  const AUTH_KEY = 'user-session';
  try {
    const s = JSON.parse(localStorage.getItem(AUTH_KEY));
    if (s && s.token) window.location.href = '/';
  } catch (e) {}

  // CPF mask
  document.getElementById('cpf').addEventListener('input', function () {
    let v = this.value.replace(/\D/g,'').slice(0,11);
    if (v.length>9) v=v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6,9)+'-'+v.slice(9);
    else if (v.length>6) v=v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6);
    else if (v.length>3) v=v.slice(0,3)+'.'+v.slice(3);
    this.value=v;
  });

  // WhatsApp mask
  document.getElementById('whatsapp').addEventListener('input', function () {
    let v = this.value.replace(/\D/g,'').slice(0,11);
    if (v.length>10) v='('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);
    else if (v.length>6) v='('+v.slice(0,2)+') '+v.slice(2,6)+'-'+v.slice(6);
    else if (v.length>2) v='('+v.slice(0,2)+') '+v.slice(2);
    else if (v.length>0) v='('+v;
    this.value=v;
  });

  // Password strength
  document.getElementById('senha').addEventListener('input', function () {
    const pw=this.value, el=document.getElementById('pw-strength');
    if (!pw) { el.style.display='none'; return; }
    el.style.display='block';
    let s=0;
    if(pw.length>=6)s++; if(pw.length>=10)s++;
    if(/[A-Z]/.test(pw))s++; if(/[0-9]/.test(pw))s++; if(/[^A-Za-z0-9]/.test(pw))s++;
    const lvls=[
      {label:'Muito fraca',color:'#DC2626',w:'20%'},{label:'Fraca',color:'#F59E0B',w:'40%'},
      {label:'Razoável',color:'#EAB308',w:'60%'},{label:'Forte',color:'#22C55E',w:'80%'},
      {label:'Muito forte',color:'#16A34A',w:'100%'}
    ];
    const l=lvls[Math.min(s-1,4)]||lvls[0];
    el.innerHTML='<div style="color:'+l.color+';font-weight:600">'+l.label+'</div><div class="strength-bar" style="background:'+l.color+';width:'+l.w+'"></div>';
  });

  // Toggle passwords
  function makeToggle(btnId,inputId,eyeId) {
    document.getElementById(btnId).addEventListener('click',function(){
      const inp=document.getElementById(inputId);
      const isText=inp.type==='text'; inp.type=isText?'password':'text';
      document.getElementById(eyeId).innerHTML=isText
        ?'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        :'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    });
  }
  makeToggle('toggle-pw1','senha','eye1');
  makeToggle('toggle-pw2','confirmar','eye2');

  function setFieldError(id,msg){
    const el=document.getElementById(id+'-err'), inp=document.getElementById(id);
    if(el){el.textContent=msg;el.style.display=msg?'block':'none';}
    if(inp){inp.classList.toggle('error-input',!!msg);}
  }
  function clearErrors(){
    ['nome','cpf','whatsapp','email','senha','confirmar'].forEach(f=>setFieldError(f,''));
    const em = document.getElementById('error-msg'); if(em) em.style.display='none';
  }
  function showError(msg){const el=document.getElementById('error-msg');el.textContent=msg;el.style.display='block';}

  function validateCPF(cpf){
    const d=cpf.replace(/\D/g,'');
    if(d.length!==11||/^(\d)\1{10}$/.test(d))return false;
    let s=0;for(let i=0;i<9;i++)s+=parseInt(d[i])*(10-i);
    let r=(s*10)%11;if(r===10||r===11)r=0;if(r!==parseInt(d[9]))return false;
    s=0;for(let i=0;i<10;i++)s+=parseInt(d[i])*(11-i);
    r=(s*10)%11;if(r===10||r===11)r=0;return r===parseInt(d[10]);
  }

  function setLoading(loading){
    const btn=document.getElementById('submit-btn');
    btn.disabled=loading;
    btn.innerHTML=loading?'<span class="spinner"></span>Criando conta...':'Criar minha conta';
  }

  document.getElementById('cadastro-form').addEventListener('submit', async function(e){
    e.preventDefault(); clearErrors();
    const nome=document.getElementById('nome').value.trim();
    const cpf=document.getElementById('cpf').value.trim();
    const whatsapp=document.getElementById('whatsapp').value.trim();
    const email=document.getElementById('email').value.trim();
    const senha=document.getElementById('senha').value;
    const confirmar=document.getElementById('confirmar').value;
    let hasError=false;
    if(!nome||nome.length<3){setFieldError('nome','Informe seu nome completo.');hasError=true;}
    const cpfDigits=cpf.replace(/\D/g,'');
    if(cpfDigits.length>0&&!validateCPF(cpf)){setFieldError('cpf','CPF inválido. Verifique os dígitos.');hasError=true;}
    const wDigits=whatsapp.replace(/\D/g,'');
    if(wDigits.length<10||wDigits.length>11){setFieldError('whatsapp','Informe DDD + número.');hasError=true;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){setFieldError('email','E-mail inválido.');hasError=true;}
    if(senha.length<6){setFieldError('senha','Mínimo 6 caracteres.');hasError=true;}
    if(senha!==confirmar){setFieldError('confirmar','As senhas não coincidem.');hasError=true;}
    if(hasError)return;
    setLoading(true);
    try {
      const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome,cpf,whatsapp,email,senha})});
      const data=await r.json();
      if(!r.ok||!data.success){
        if(data.error&&data.error.toLowerCase().includes('e-mail'))setFieldError('email',data.error);
        else if(data.error&&data.error.toLowerCase().includes('cpf'))setFieldError('cpf',data.error);
        else showError(data.error||'Erro ao criar conta.');
        setLoading(false); return;
      }
      const loginR=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,senha})});
      const loginData=await loginR.json();
      if(loginData.success)localStorage.setItem(AUTH_KEY,JSON.stringify({token:loginData.token,...loginData.user}));
      if(window.MetaPixel) window.MetaPixel.completeRegistration();
      const successEl=document.getElementById('success-msg');
      successEl.innerHTML='Conta criada com sucesso! Redirecionando...';
      successEl.style.display='block';
      document.getElementById('cadastro-form').style.display='none';
      const _redir = new URLSearchParams(window.location.search).get('redirect');
      setTimeout(()=>{window.location.href=_redir?decodeURIComponent(_redir):'/';},1500);
    } catch(err) {
      showError('Erro de conexão. Tente novamente.');
      setLoading(false);
    }
  });
})();
</script>
<script src="/js/whatsapp-validator.js"></script>
<script>
(function () {
  document.addEventListener('DOMContentLoaded', function () {
    new WhatsAppValidator(document.getElementById('whatsapp'), { origin: 'cadastro' });
  });
})();
</script>
<script src="/js/cookie-consent.js"></script>
  <script src="/js/site-brand.js"></script>
</body>
</html>
